name: Build Nuxt3 Application

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

# Queue deploys instead of running them side by side: two concurrent uploads to
# the same storage zone would delete each other's chunks. Never cancel a running
# one, it would leave the zone half updated.
concurrency:
    group: deploy-${{ github.ref }}
    cancel-in-progress: false

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  submodules: true

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '22'

            - name: Install dependencies
              run: npm ci

            - name: Generate static site
              run: npm run generate

            # Pull requests build only: deploying one would overwrite production
            # with the branch content and delete the live files.
            - name: Deploy to Bunny
              if: github.event_name == 'push'
              uses: R-J-dev/bunny-deploy@v2.1.1
              with:
                access-key: ${{ secrets.BUNNY_ACCESS_KEY }}
                directory-to-upload: ".output/public"  # Nuxt 3
                storage-endpoint: "https://storage.bunnycdn.com"
                storage-zone-name: "bloggrify-com"
                storage-zone-password: ${{ secrets.BUNNY_STORAGE_ZONE_PASSWORD }}
                enable-delete-action: true
                enable-purge-pull-zone: true
                pull-zone-id: "5069277"
                concurrency: 50
                replication-timeout: "15000"
                request-timeout: "15000" # optional, defaults to 5000
                retry-limit: "6" # optional, defaults to 3
